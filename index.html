<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="./icon.png" />
  <title>LEEJINWOO</title>
  <meta name="description" content="Serverless-first mobile apps by Nexus11.StandAlone" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --surface: #111111;
      --surface2: #181818;
      --border: rgba(255, 255, 255, 0.07);
      --text: rgba(255, 255, 255, 0.87);
      --muted: rgba(255, 255, 255, 0.42);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Hero ── */
    .hero {
      max-width: 800px;
      margin: 0 auto;
      padding: 96px 24px 72px;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.4px;
      margin-bottom: 28px;
    }

    .badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
      animation: blink 2.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .hero h1 {
      font-size: clamp(40px, 9vw, 72px);
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1.05;
      margin-bottom: 20px;
      background: linear-gradient(160deg, #ffffff 30%, rgba(255, 255, 255, 0.45) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      font-size: 17px;
      color: var(--muted);
      max-width: 420px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ── Year Nav ── */
    .year-nav {
      display: flex;
      justify-content: center;
      padding: 0 24px 96px;
    }

    .year-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 40px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-decoration: none;
      transition: border-color 0.25s, transform 0.25s, background 0.25s;
    }

    .year-btn:hover {
      border-color: rgba(255, 255, 255, 0.2);
      background: var(--surface2);
      transform: translateY(-3px);
    }

    .year-btn svg { opacity: 0.5; }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 24px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    footer a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover { color: var(--text); }

    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .footer-sep { opacity: 0.3; }
  </style>
</head>
<body>

  <section class="hero">
    <div class="badge"><span class="dot"></span>Nexus11.StandAlone</div>
    <h1>leejinwoo</h1>
    <p>Serverless-first mobile apps.<br>No backend, no login, no tracking — just your device.</p>
  </section>

  <main class="year-nav">
  </main>

  <footer>
    <div class="footer-inner">
      <span>© 2026 Nexus11.StandAlone</span>
      <span class="footer-sep">·</span>
      <a href="mailto:nexus11@gmail.com">nexus11@gmail.com</a>
    </div>
  </footer>


</body>
</html>
